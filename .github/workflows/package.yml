name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v1
    - name: Install Perl Stuff
      run: |
        brew install gd
        brew install pkg-config
        brew install cpanm
        cpanm GD
        cpanm POSIC
        cpanm Config::Tiny
        cpanm File::stat
        cpanm Geo::ShapeFile
        cpanm PAR
        cpanm -v PAR::Packer
        perl ./test.pl
        env
        which pp
        pp -o test ./test.pl
        ./test