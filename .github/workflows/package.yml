name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v1
    - name: Install Perl Stuff
      run: |
        env
        which perl
        perl -V
        brew install pkg-config
        curl -L https://cpanmin.us | perl - App::cpanminus -v
        /usr/local/Cellar/perl/5.30.0/bin/cpanm --info
        cpanm -v --installdeps Config::Tiny
        which cpanm
        perl ./test.pl
        which pp
        pp -o test ./test.pl
        ./test