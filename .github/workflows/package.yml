name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - name: Install Perl Stuff
      run: |
        echo $PATH
        curl -L https://cpanmin.us | perl - App::cpanminus -v --sudo
        /usr/local/bin/cpanm GD
