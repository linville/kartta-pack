name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v1
    - name: Install Perl Stuff
      run: |
        brew install pkg-config
        brew install cpanm
        cpanm -v --installdeps Config::Tiny
        cpanm --info
        which cpanm
        which perl
        perl -V
        brew config
        brew info perl
        env
        perl ./test.pl
        which pp
        pp -o test ./test.pl
        ./test