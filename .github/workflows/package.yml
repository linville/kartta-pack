name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - name: Install Perl Stuff
      run: |
        brew install gd
        brew install pkg-config
        brew install cpanm
        cpanm -v --installdeps GD
        cpanm -v --installdeps POSIX
        cpanm -v --installdeps Config::Tiny
        cpanm -v --installdeps File::stat
        cpanm -v --installdeps Geo::ShapeFile
        perl ./test.pl
