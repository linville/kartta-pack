name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - name: Install Perl Stuff
      run: |
        brew install pkg-config
        brew install cpanm
        cpanm --installdeps GD
