name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v1
    - name: Install Brew Items
      run: |
        brew install pkg-config
        brew install coreutils
        brew install cpanm
    - name: Install Perl Modules
      run: |
        cpanm -f PAR
        cpanm PAR::Packer
    - name: Package
      shell: bash -v {0}
      run: |
        export PATH="$PATH:`realpath cpanm`"
        perl ./test.pl
        which pp
        pp -o test ./test.pl
        ./test