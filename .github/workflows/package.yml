name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v1
    - name: Install Perl Stuff
      run: |
        brew install pkg-config
        brew install coreutils
        brew install gd
        brew install cpanm
        export PATH="$PATH:`realpath cpanm`"
        cpanm GD
        cpanm POSIX
        cpanm Config::Tiny
        cpanm File::stat
        cpanm Geo::ShapeFile
        cpanm -f PAR
        cpanm PAR::Packer
        perl ./test.pl
        brew link pp
        which pp
        pp -o test ./test.pl
        ./test