name: Package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
        # os: [macOS-latest, ubuntu-latest]

    steps:
    - name: Install Perl Stuff
      run: |
        curl -L https://cpanmin.us | perl - App::cpanminus --sudo
        cpanm GD
        
